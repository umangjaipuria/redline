<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>redline</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="mask-icon" href="/favicon.svg" color="#c4361d">
    <link rel="stylesheet" href="/fonts.css">
    <link rel="stylesheet" href="/style.css">
  </head>
  <body>
    <div class="app-shell" data-rail="empty">
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true">
            <svg viewBox="0 0 32 32" fill="none" width="28" height="28">
              <defs>
                <linearGradient id="brandInk" x1="6" y1="6" x2="26" y2="26" gradientUnits="userSpaceOnUse">
                  <stop stop-color="#df4628"/>
                  <stop offset="1" stop-color="#a81f0c"/>
                </linearGradient>
              </defs>
              <rect x="1" y="1" width="30" height="30" rx="8.5" fill="#fbf6ed"/>
              <rect x="1.5" y="1.5" width="29" height="29" rx="8" fill="none" stroke="#000" stroke-opacity="0.07"/>
              <path d="M7.4 23.2c5.1-3.3 12.2-9.3 18.8-15.4-2.7 5.8-8.1 11.7-13.9 15.4 2.5-.3 5-1.3 7.5-3-2.9 3-6.9 4.9-11.5 4.7-.5 0-.9-1.1-.9-1.7Z" fill="url(#brandInk)"/>
            </svg>
          </span>
          <div class="app-name">redline</div>
          <span id="documentPath" class="document-path"></span>
          <button id="openButton" type="button" class="icon-button open-icon" title="Open file…" aria-label="Open file">
            <svg class="btn-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M4 8V6.2A1.7 1.7 0 0 1 5.7 4.5H9l2 2h6.3A1.7 1.7 0 0 1 19 8.2" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/>
              <path d="M3.2 9.5h17.2l-2.1 8.3a1 1 0 0 1-1 .7H6.3a1 1 0 0 1-1-.7z" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
        <div class="toolbar" aria-label="Document actions">
          <label class="author-control">
            <span class="author-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" width="15" height="15">
                <circle cx="12" cy="8" r="3.4" stroke="currentColor" stroke-width="1.7"/>
                <path d="M5.5 19a6.5 6.5 0 0 1 13 0" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
              </svg>
            </span>
            <input id="authorName" type="text" autocomplete="name" spellcheck="false" placeholder="Your name">
          </label>
          <span class="toolbar-divider" aria-hidden="true"></span>
          <button id="reloadButton" type="button" class="ghost-button" title="Reload document">
            <svg class="btn-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M19.5 12a7.5 7.5 0 1 1-2.2-5.3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
              <path d="M19.5 4.5V9H15" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span class="btn-label">Reload</span>
          </button>
          <span id="saveStatus" class="save-status" role="status" hidden></span>
          <button id="editButton" type="button" class="ghost-button" title="Toggle edit mode">
            <svg class="btn-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M14.5 5.5 18.5 9.5 8.5 19.5 4 20.5 5 16z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
              <path d="M13 7 17 11" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
            <span class="btn-label">Edit</span>
          </button>
          <span class="toolbar-divider comment-controls-divider" aria-hidden="true"></span>
          <div id="commentControls" class="comment-controls" hidden>
            <button id="previousCommentButton" type="button" class="ghost-button comment-nav-button"
              title="Previous comment" aria-label="Previous comment">
              <svg class="btn-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="m11 7-5 5 5 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="m18 7-5 5 5 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
            <button id="railToggle" type="button" class="ghost-button rail-toggle"
              title="Hide comments" aria-pressed="false">
              <svg class="btn-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <rect x="3.5" y="5" width="17" height="14" rx="2.2" stroke="currentColor" stroke-width="1.8"/>
                <path d="M14.5 5v14" stroke="currentColor" stroke-width="1.8"/>
                <path class="rail-toggle-fill" d="M14.9 5.4h3.4a1.8 1.8 0 0 1 1.8 1.8v9.6a1.8 1.8 0 0 1-1.8 1.8h-3.4z" fill="currentColor" stroke="none"/>
              </svg>
              <span class="btn-label">Comments</span>
              <span id="railToggleCount" class="count-badge">0</span>
            </button>
            <button id="nextCommentButton" type="button" class="ghost-button comment-nav-button"
              title="Next comment" aria-label="Next comment">
              <svg class="btn-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="m6 7 5 5-5 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="m13 7 5 5-5 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
          </div>
        </div>
      </header>

      <main class="workspace">
        <section class="document-pane" aria-label="HTML document">
          <div id="notice" class="notice" hidden>
            <span class="notice-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" width="20" height="20">
                <path d="M12 4.5 21 19.5H3z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
                <path d="M12 10v4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                <circle cx="12" cy="16.6" r="1" fill="currentColor"/>
              </svg>
            </span>
            <div class="notice-text">
              <strong id="noticeTitle"></strong>
              <p id="noticeBody"></p>
            </div>
            <button id="noticeAction" type="button" class="ghost-button">
              <svg class="btn-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M19.5 12a7.5 7.5 0 1 1-2.2-5.3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                <path d="M19.5 4.5V9H15" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
              <span class="btn-label">Reload</span>
            </button>
          </div>
          <!--
            Reviewed documents are trusted (you or your agent authored them); the
            alternative is opening the HTML directly in a browser with no sandbox at
            all. So we intentionally allow forms and popups. allow-scripts is
            deliberately omitted — scripts stay disabled. Keep these flags.
          -->
          <iframe
            id="documentFrame"
            class="document-frame"
            title="Reviewed HTML document"
            sandbox="allow-same-origin allow-forms allow-popups"
          ></iframe>

          <div id="emptyState" class="empty-state" hidden>
            <div class="empty-state-card">
              <span class="empty-state-mark" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" width="34" height="34">
                  <path d="M4 8V6.2A1.7 1.7 0 0 1 5.7 4.5H9l2 2h6.3A1.7 1.7 0 0 1 19 8.2" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
                  <path d="M3.2 9.5h17.2l-2.1 8.3a1 1 0 0 1-1 .7H6.3a1 1 0 0 1-1-.7z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
                </svg>
              </span>
              <h1>No document open</h1>
              <p>Open an HTML file to review it here. Comments are saved inside the file itself, so it stays portable.</p>
              <button id="emptyOpenButton" type="button" class="primary-button">Open a file…</button>
              <p id="howtoHint" class="empty-howto" hidden>
                New to Redline? <a id="howtoLink" href="#">Open the how-to guide</a>.
              </p>
            </div>
          </div>
        </section>

        <aside class="comment-rail" aria-label="Comment threads">
          <div class="comment-rail-inner">
          <section id="composer" class="composer" hidden>
            <form id="commentForm">
              <textarea id="commentBody" rows="4" placeholder="Add a comment&#8230;"></textarea>
              <div class="composer-actions">
                <button id="cancelCommentButton" type="button" class="icon-action" title="Discard comment" aria-label="Discard comment">
                  <svg class="btn-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <path d="M6.5 6.5 17.5 17.5M17.5 6.5 6.5 17.5" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"/>
                  </svg>
                </button>
                <button type="submit" class="icon-action primary" title="Post comment" aria-label="Post comment">
                  <svg class="btn-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <path d="M4.5 11.5 19 5l-6 14-2.6-5.4z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
                    <path d="m10.4 13.6 4.2-4.2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                  </svg>
                </button>
              </div>
            </form>
          </section>

          <div id="threads" class="threads"></div>
          </div>
        </aside>
      </main>
    </div>

    <button id="selectionFab" class="selection-fab" type="button" hidden title="Comment on selection" aria-label="Comment on selection">
      <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M4.5 6.5A2 2 0 0 1 6.5 4.5h11a2 2 0 0 1 2 2v7a2 2 0 0 1-2 2H10l-4 3.5v-3.5H6.5a2 2 0 0 1-2-2z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
        <path d="M9 10h6M9 7.6h6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
      </svg>
    </button>

    <div id="selectionAlert" class="selection-alert-backdrop" role="alertdialog" aria-modal="true"
      aria-labelledby="selectionAlertTitle" aria-describedby="selectionAlertBody" hidden>
      <section class="selection-alert-box">
        <h2 id="selectionAlertTitle">Selection too broad</h2>
        <p id="selectionAlertBody">Select text within one paragraph, table cell, or list item to add a comment.</p>
        <button id="selectionAlertClose" type="button" class="primary-button">OK</button>
      </section>
    </div>

    <script type="module" src="/app.js"></script>
  </body>
</html>
